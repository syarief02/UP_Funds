<!--
  login.html - Admin Login Page
-->
{% extends 'base.html' %}

{% block title %}Admin Login{% endblock %}
{% block page_title %}
    <i class="bi bi-box-arrow-in-right me-2"></i>Admin Login
{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card content-card shadow">
            <div class="card-header text-center py-3">
                <div class="brand-icon mx-auto mb-2" style="background: var(--primary); color: white; width: 60px; height: 60px; font-size: 1.8rem; border: none;">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h5 class="mb-0 fw-bold">Admin Login</h5>
                <p class="text-muted small mb-0">Authorized access only</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('login', next=request.args.get('next', '')) }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-medium">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
